<div class="modal fade" id="provisionModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-0 pt-4 px-4">
                <h5 class="fw-bold">Enterprise Space Provisioning</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form method="POST" action="{{ url_for('super_admin.provision_tenant') }}">
                <div class="modal-body p-4">
                    <div class="row g-3 g-md-4">
                        <div class="col-md-8">
                            <label class="form-label fw-bold">Organization / Tenant Name</label>
                            <input type="text" name="name" class="form-control bg-light border-0" placeholder="e.g. Maskan Elite Academy" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Floor Capacity</label>
                            <input type="number" name="floor_count" class="form-control bg-light border-0" value="11" min="1" max="100">
                        </div>
                        
                        <div class="col-md-12">
                            <div class="p-3 p-md-4 bg-primary bg-opacity-10 rounded-4">
                                <h6 class="fw-bold mb-3 text-primary"><i class="fas fa-user-shield me-2"></i>Initial Administrator Credentials</h6>
                                <div class="row g-3">
                                    <div class="col-md-4">
                                        <input type="text" name="admin_username" class="form-control border-0" placeholder="Username" required>
                                    </div>
                                    <div class="col-md-4">
                                        <input type="email" name="admin_email" class="form-control border-0" placeholder="Email Address" required>
                                    </div>
                                    <div class="col-md-4">
                                        <input type="password" name="admin_password" class="form-control border-0" placeholder="Password" required>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 pb-4 px-4">
                    <button type="button" class="btn btn-light rounded-3" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-ceo px-5 rounded-3 shadow-sm">Initialize Node</button>
                </div>
            </form>
        </div>
    </div>
</div>
