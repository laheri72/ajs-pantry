<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Login - AJS Pantry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at top left, rgba(217,119,6,0.18), transparent 35%),
                linear-gradient(135deg, #0b3d2e, #111827);
            font-family: "Segoe UI", sans-serif;
        }
        .login-card {
            width: min(460px, calc(100vw - 2rem));
            border: none;
            border-radius: 26px;
            overflow: hidden;
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.24);
        }
        .hero {
            background: linear-gradient(135deg, #0f766e, #14532d);
            color: #fff;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <div class="card login-card">
        <div class="hero text-center">
            <div class="mb-3"><i class="fas fa-building-columns fa-3x"></i></div>
            <h2 class="fw-bold mb-1">Faculty Login</h2>
            <div class="small opacity-75">Budget control and report verification office</div>
        </div>
        <div class="card-body p-4 p-md-5">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} rounded-4 border-0">
                    {{ message }}
                </div>
                {% endfor %}
            {% endif %}
            {% endwith %}
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold small text-uppercase text-muted">Email</label>
                    <input class="form-control form-control-lg rounded-4" name="email" placeholder="e.g. male_residences.marol@jameasaifiyah.edu" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold small text-uppercase text-muted">Password</label>
                    <input type="password" class="form-control form-control-lg rounded-4" name="password" required>
                </div>
                <button class="btn btn-success w-100 rounded-pill py-3 fw-bold">Enter Faculty Portal</button>
            </form>
        </div>
    </div>
</body>
</html>
